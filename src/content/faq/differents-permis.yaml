question: Quels sont les différents permis bateaux ?
answer: "Il existe trois principaux permis de plaisance en France : le permis côtier (mer, jusqu'à 6 milles d'un abri), le permis fluvial (rivières, lacs et canaux), et l'extension hauturière (mer sans limite de distance, nécessite le permis côtier). Nous proposons également le CRR (Certificat Radio)."
order: 1
